  api:
    build:
      context: .
      dockerfile: apps/api-spring/Dockerfile.prod
      args:
        MAVEN_IMAGE: ${JIANDOU_MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JAVA_IMAGE: ${JIANDOU_JAVA_IMAGE:-eclipse-temurin:21-jre-jammy}
      target: jvm-runtime
    container_name: jiandou-api-prod
    restart: unless-stopped
    cpus: ${JIANDOU_API_CPUS:-1.25}
    mem_limit: ${JIANDOU_API_MEMORY_LIMIT:-1536m}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 8000
      SPRING_THREADS_VIRTUAL_ENABLED: ${SPRING_THREADS_VIRTUAL_ENABLED:-true}
      SPRING_MAIN_KEEP_ALIVE: ${SPRING_MAIN_KEEP_ALIVE:-true}
      JIANDOU_APP_ENV: prod
      JIANDOU_EXECUTION_MODE: ${JIANDOU_EXECUTION_MODE:-queue}
      JIANDOU_DATABASE_URL: ${JIANDOU_DATABASE_URL:?set JIANDOU_DATABASE_URL in .env.prod}
      JIANDOU_DATABASE_USER: ${JIANDOU_DATABASE_USER:?set JIANDOU_DATABASE_USER in .env.prod}
      JIANDOU_DATABASE_PASSWORD: ${JIANDOU_DATABASE_PASSWORD:?set JIANDOU_DATABASE_PASSWORD in .env.prod}
      JIANDOU_DB_POOL_MAX_SIZE: ${JIANDOU_DB_POOL_MAX_SIZE:-3}
      JIANDOU_DB_POOL_MIN_IDLE: ${JIANDOU_DB_POOL_MIN_IDLE:-1}
      JIANDOU_GENERATION_ASYNC_THREADS: ${JIANDOU_GENERATION_ASYNC_THREADS:-1}
      JIANDOU_TASK_OPS_WORKER_CONCURRENCY: ${JIANDOU_TASK_OPS_WORKER_CONCURRENCY:-1}
      JIANDOU_WEB_ORIGIN: ${JIANDOU_WEB_ORIGIN:?set JIANDOU_WEB_ORIGIN in .env.prod}
      JIANDOU_COOKIE_SECURE: ${JIANDOU_COOKIE_SECURE:-false}
      JIANDOU_AUTH_BOOTSTRAP_INITIAL_ADMIN_USERNAME: ${JIANDOU_AUTH_BOOTSTRAP_INITIAL_ADMIN_USERNAME:-admin}
      JIANDOU_AUTH_BOOTSTRAP_INITIAL_ADMIN_DISPLAY_NAME: ${JIANDOU_AUTH_BOOTSTRAP_INITIAL_ADMIN_DISPLAY_NAME:-系统管理员}
      JIANDOU_AUTH_BOOTSTRAP_INITIAL_ADMIN_PASSWORD: ${JIANDOU_AUTH_BOOTSTRAP_INITIAL_ADMIN_PASSWORD:?set JIANDOU_AUTH_BOOTSTRAP_INITIAL_ADMIN_PASSWORD in .env.prod}
      JIANDOU_STORAGE_ROOT: /app/storage
      JIANDOU_STORAGE_PUBLIC_BASE_URL: ${JIANDOU_STORAGE_PUBLIC_BASE_URL:-}
      JIANDOU_CONFIG_DIR: /app/config
      JIANDOU_FFMPEG_BIN: ffmpeg
    volumes:
      - ./config:/app/config
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v3/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NODE_IMAGE: ${JIANDOU_NODE_IMAGE:-node:20-bookworm-slim}
        NGINX_IMAGE: ${JIANDOU_NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: jiandou-web-prod
    restart: unless-stopped
    cpus: ${JIANDOU_WEB_CPUS:-0.25}
    mem_limit: ${JIANDOU_WEB_MEMORY_LIMIT:-128m}
    environment:
      JIANDOU_PUBLIC_API_BASE_URL: ${JIANDOU_PUBLIC_API_BASE_URL:-/api/v3}
      JIANDOU_PUBLIC_STORAGE_BASE_URL: ${JIANDOU_PUBLIC_STORAGE_BASE_URL:-/storage}
      JIANDOU_PUBLIC_ADMIN_BASE_URL: ${JIANDOU_PUBLIC_ADMIN_BASE_URL:?set JIANDOU_PUBLIC_ADMIN_BASE_URL in .env.prod}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/runtime-config.json >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.prod
      args:
        NODE_IMAGE: ${JIANDOU_NODE_IMAGE:-node:20-bookworm-slim}
        NGINX_IMAGE: ${JIANDOU_NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: jiandou-admin-prod
    restart: unless-stopped
    cpus: ${JIANDOU_ADMIN_CPUS:-0.25}
    mem_limit: ${JIANDOU_ADMIN_MEMORY_LIMIT:-128m}
    environment:
      JIANDOU_PUBLIC_API_BASE_URL: ${JIANDOU_PUBLIC_API_BASE_URL:-/api/v3}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/runtime-config.json >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  gateway:
    image: ${JIANDOU_NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: jiandou-gateway-prod
    restart: unless-stopped
    cpus: ${JIANDOU_GATEWAY_CPUS:-0.25}
    mem_limit: ${JIANDOU_GATEWAY_MEMORY_LIMIT:-96m}
    ports:
      - "${JIANDOU_WEB_PORT:-80}:80"
      - "${JIANDOU_ADMIN_PORT:-5174}:5174"
    volumes:
      - ./apps/gateway/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Host: jiandou.org' http://127.0.0.1/ >/dev/null && wget -qO- --header='Host: jiandou.org' http://127.0.0.1/api/v3/health >/dev/null && wget -qO- --header='Host: jiandou.org' http://127.0.0.1/v3/api-docs >/dev/null && wget -qO- --header='Host: admin.jiandou.org' http://127.0.0.1/runtime-config.json >/dev/null && wget -qO- http://127.0.0.1:5174/runtime-config.json >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

