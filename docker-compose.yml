# 本地开发所需的数据库、Spring API 和前端服务编排。
name: jiandou

services:
  # MySQL 用于存储任务元数据和持久化业务数据。
  mysql:
    image: mysql:8.4
    container_name: jiandou-mysql
    command: ["mysqld", "--default-time-zone=+08:00"]
    environment:
      TZ: Asia/Shanghai
      # 仅供本地开发容器使用的 root 密码。
      MYSQL_ROOT_PASSWORD: root
      # 首次启动时自动创建的数据库名。
      MYSQL_DATABASE: jiandou
    ports:
      - "3306:3306"
    volumes:
      # 持久化数据库文件，避免容器重启后数据丢失。
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Spring Boot 后端服务，已内嵌 queue worker，挂载源码以支持热更新。
  api:
    build:
      context: .
      dockerfile: apps/api-spring/Dockerfile
    container_name: jiandou-api
    working_dir: /app/apps/api-spring
    environment:
      # Spring 端改用 JDBC 连接 MySQL。
      JIANDOU_DATABASE_URL: jdbc:mysql://mysql:3306/jiandou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      JIANDOU_EXECUTION_MODE: queue
      JIANDOU_WEB_ORIGIN: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174
      SERVER_PORT: 8000
    command:
      [
        "mvn",
        "spring-boot:run",
        "-Dspring-boot.run.jvmArguments=-Dserver.port=8000",
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api-spring:/app/apps/api-spring
      - ./config:/app/config
      - ./storage/uploads:/app/storage/uploads
      - ./storage/outputs:/app/storage/outputs
      - ./storage/temp:/app/storage/temp
    depends_on:
      mysql:
        condition: service_healthy

  # Vue 前端的 Vite 开发服务器。
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: jiandou-web
    working_dir: /app/apps/web
    environment:
      # 使用轮询方式监听文件，提升 Docker 挂载目录下的热更新稳定性。
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://api:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    volumes:
      # 挂载前端源码，同时把 node_modules 放在命名卷中。
      - ./apps/web:/app/apps/web
      - web_node_modules:/app/apps/web/node_modules
    depends_on:
      api:
        condition: service_started

  # Element Plus 管理后台的 Vite 开发服务器。
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: jiandou-admin
    working_dir: /app/apps/admin
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://api:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5174"]
    ports:
      - "5174:5174"
    volumes:
      - ./apps/admin:/app/apps/admin
      - admin_node_modules:/app/apps/admin/node_modules
    depends_on:
      api:
        condition: service_started

# 命名卷用于保留本地状态，同时避免污染仓库目录。
volumes:
  mysql_data:
  web_node_modules:
  admin_node_modules:
