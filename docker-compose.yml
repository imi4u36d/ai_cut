services:
  mysql:
    image: mysql:8.4
    container_name: ai-cut-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_cut
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7.4
    container_name: ai-cut-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-cut-api
    working_dir: /app/apps/api
    environment:
      AI_CUT_DATABASE_URL: mysql+pymysql://root:root@mysql:3306/ai_cut?charset=utf8mb4
      AI_CUT_REDIS_URL: redis://redis:6379/0
      AI_CUT_WEB_ORIGIN: http://127.0.0.1:5173
      AI_CUT_PUBLIC_BASE_URL: http://127.0.0.1:8000/storage
    command: ["uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
      - ./config:/app/config
      - ./storage/uploads:/app/storage/uploads
      - ./storage/outputs:/app/storage/outputs
      - ./storage/temp:/app/storage/temp
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ai-cut-web
    working_dir: /app/apps/web
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://api:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - web_node_modules:/app/apps/web/node_modules
    depends_on:
      api:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  web_node_modules:
