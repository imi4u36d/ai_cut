gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.ms-fontobject
    application/wasm
    application/x-javascript
    application/xml
    font/ttf
    font/otf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

upstream jiandou_web {
    server web:80;
}

upstream jiandou_admin {
    server admin:80;
}

upstream jiandou_api {
    server api:9000;
}

map $http_x_forwarded_proto $jiandou_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 80;
    server_name admin.jiandou.org admin.jiandou.org.;

    client_max_body_size 512m;
    add_header X-Jiandou-Gateway-Route "admin-domain" always;

    location /api/v3/ {
        proxy_pass http://jiandou_api/api/v3/;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location /v3/api-docs {
        proxy_pass http://jiandou_api/v3/api-docs;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location ^~ /storage/thumbs/ {
        proxy_pass http://jiandou_api/storage/thumbs/;
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location /storage/ {
        proxy_pass http://jiandou_api/storage/;
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=21600" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location / {
        proxy_pass http://jiandou_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }
}

server {
    listen 80 default_server;
    server_name _;

    add_header X-Jiandou-Gateway-Route "unmatched-host" always;
    return 421;
}

