include /etc/nginx/jiandou-prod.conf;

server {
    listen 80;
    server_name localhost localhost. 127.0.0.1;

    client_max_body_size 512m;
    add_header X-Jiandou-Gateway-Route "dev-local-web" always;

    location /api/v3/ {
        proxy_pass http://jiandou_api/api/v3/;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location /v3/api-docs {
        proxy_pass http://jiandou_api/v3/api-docs;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location ^~ /storage/thumbs/ {
        proxy_pass http://jiandou_api/storage/thumbs/;
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location /storage/ {
        proxy_pass http://jiandou_api/storage/;
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=21600" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }

    location / {
        proxy_pass http://jiandou_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $jiandou_forwarded_proto;
    }
}
