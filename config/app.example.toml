# 应用基础运行配置。
[app]
# 用于日志和界面展示的应用名称。
name = "AI Cut"
# 部署环境标识，通常为 local / dev / prod。
env = "local"
# API 服务在当前运行环境中的监听地址。
api_host = "0.0.0.0"
# FastAPI / Uvicorn 对外监听端口。
api_port = 8000
# 允许访问 API 的前端来源地址。
web_origin = "http://localhost:5173"
# 任务执行模式，inline 表示进程内直接执行。
execution_mode = "inline"

# 主数据库连接配置。
[database]
# 应用数据库的 SQLAlchemy DSN。
url = "mysql+pymysql://root:root@127.0.0.1:3306/ai_cut?charset=utf8mb4"
# 是否输出 SQL 日志，便于调试。
echo = false

# Redis 连接配置，用于轻量协调和缓存。
[redis]
# 包含库编号的 Redis DSN。
url = "redis://127.0.0.1:6379/0"

# 本地文件存储结构，用于上传、产物和临时文件。
[storage]
# 所有运行时持久化数据的根目录。
root_dir = "storage"
# 上传源文件的保存目录。
uploads_dir = "storage/uploads"
# 生成媒体产物的输出目录。
outputs_dir = "storage/outputs"
# 临时工作文件目录。
temp_dir = "storage/temp"
# 对外可访问的存储根 URL。
public_base_url = "http://127.0.0.1:8000/storage"

# 系统提示词配置文件路径。
[prompt]
# 用于集中管理 system prompt 的 TOML 文件。
file = "config/prompts"

# 模型服务提供方和推理默认配置。
[model]
# 查询阿里云计费用量时使用的 Access Key ID。
aliyun_billing_access_key_id = ""
# 查询阿里云计费用量时使用的 Access Key Secret。
aliyun_billing_access_key_secret = ""
# 查询火山计费用量时使用的 Access Key ID。
volcengine_billing_access_key_id = ""
# 查询火山计费用量时使用的 Access Key Secret。
volcengine_billing_access_key_secret = ""
# 按模型维度的额度映射，JSON 字符串格式，可供前端或计费提示使用。
video_model_usage_quota = "{\"wan2.6-i2v\":300,\"wan2.6-t2v\":300,\"qwen-vl\":200,\"seeddance-1.5-pro\":200}"
# 视频生成时是否允许服务端自动扩写或改写提示词。
video_prompt_extend = false
# 阿里云视频任务轮询间隔，单位秒。
video_poll_interval_seconds = 8
# 阿里云视频任务最长等待时间，单位秒。
video_poll_timeout_seconds = 600
# 视频生成统一轮询间隔（严格模式必填）。
video_generation_poll_interval_seconds = 8
# 视频生成统一最大等待时长（严格模式必填）。
video_generation_max_wait_seconds = 600
# 模型请求超时时间，单位秒。
timeout_seconds = 120
# 文本生成采样温度。
temperature = 0.15
# 文本响应最大生成 token 数。
max_tokens = 2000
# 视觉分析时抽取的帧数。
vision_frame_count = 6

[model.providers.qwen]
provider = "qwen"
api_key = "replace-with-your-key"
base_url = "https://dashscope.aliyuncs.com/api/v2/apps/protocols/compatible-mode/v1"

[model.providers.qwen.extras]
video_endpoint = "https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis"
video_task_endpoint = "https://dashscope.aliyuncs.com/api/v1/tasks"
video_generation_endpoint = "https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis"

[model.providers.openai]
provider = "openai"
api_key = "replace-with-openai-key"
base_url = "https://api.openai.com/v1"

[model.providers.volcengine]
provider = "volcengine"
api_key = "replace-with-seeddance-key"
base_url = "https://ark.cn-beijing.volces.com/api/v3"

[model.providers.volcengine.extras]
seeddance_video_endpoint = "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
seeddance_video_task_endpoint = "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
seeddance_poll_interval_seconds = 8
seeddance_poll_timeout_seconds = 600
seedream_image_endpoint = "https://ark.cn-beijing.volces.com/api/v3/images/generations"

[model.models."gpt-5.4"]
provider = "openai"
kind = "text"
label = "GPT-5.4"
capabilities = ["text"]
fallback = "qwen3.6-plus"

[model.models."qwen3.6-plus"]
provider = "qwen"
kind = "text"
label = "Qwen 3.6 Plus"
capabilities = ["text"]
fallback = "qwen-plus"

[model.models."qwen-plus"]
provider = "qwen"
kind = "text"
label = "Qwen Plus"
capabilities = ["text"]

[model.models."qwen-vl-plus-latest"]
provider = "qwen"
kind = "vision"
label = "Qwen-VL Plus"
capabilities = ["vision", "text"]
fallback = "qwen3-vl-flash"

[model.models."qwen3-vl-flash"]
provider = "qwen"
kind = "vision"
label = "Qwen 3 VL Flash"
capabilities = ["vision", "text"]

[model.models."Doubao-Seedream-4.5"]
provider = "volcengine"
kind = "image"
label = "Doubao Seedream 4.5"
capabilities = ["image"]

[model.models."wan2.6-i2v"]
provider = "qwen"
kind = "video"
label = "Wan 2.6 图生视频"
capabilities = ["video"]

[model.models."seeddance-1.5-pro"]
provider = "volcengine"
kind = "video"
label = "SeedDance 1.5 Pro"
capabilities = ["video"]

[model.defaults]
text_analysis = "gpt-5.4"
planner_fusion = "gpt-5.4"
creative_prompt = "qwen3.6-plus"
vision_analysis = "qwen-vl-plus-latest"
prompt_rewrite = "qwen-vl-plus-latest"
image_generation = "Doubao-Seedream-4.5"
video_generation = "wan2.6-i2v"

# 请求未显式指定时使用的流程默认值。
[pipeline]
# 前后端共同使用的默认视频比例。
default_aspect_ratio = "9:16"
# 单次请求允许生成的最大结果数。
max_output_count = 10
# 流程允许处理的源视频最大时长，单位分钟。
max_source_minutes = 120
# 默认片头模板名称。
default_intro_template = "hook"
# 默认片尾模板名称。
default_outro_template = "brand"
