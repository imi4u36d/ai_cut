[app]
name = "AI Cut"
env = "local"
api_host = "0.0.0.0"
api_port = 8000
web_origin = "http://localhost:5173"
execution_mode = "inline"

[database]
url = "mysql+pymysql://root:root@127.0.0.1:3306/ai_cut?charset=utf8mb4"
echo = false

[redis]
url = "redis://127.0.0.1:6379/0"

[storage]
root_dir = "storage"
uploads_dir = "storage/uploads"
outputs_dir = "storage/outputs"
temp_dir = "storage/temp"
public_base_url = "http://127.0.0.1:8000/storage"

[model]
provider = "qwen"
model_name = "qwen-max-latest"
fallback_model_name = "qwen-plus"
vision_model_name = "qwen-vl-plus-latest"
vision_fallback_model_name = "qwen3-vl-flash"
endpoint = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
api_key = "replace-with-your-key"
timeout_seconds = 120
temperature = 0.15
max_tokens = 2000
vision_frame_count = 6

[pipeline]
default_aspect_ratio = "9:16"
max_output_count = 10
max_source_minutes = 120
default_intro_template = "hook"
default_outro_template = "brand"
