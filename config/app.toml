# 应用基础运行配置。
[app]
# 用于日志和界面展示的应用名称。
name = "AI Cut"
# 部署环境标识，通常为 local / dev / prod。
env = "local"
# API 服务在当前运行环境中的监听地址。
api_host = "0.0.0.0"
# FastAPI / Uvicorn 对外监听端口。
api_port = 8000
# 允许访问 API 的前端来源地址。
web_origin = "http://localhost:5173"
# 任务执行模式，inline 表示进程内直接执行。
execution_mode = "inline"

# 主数据库连接配置。
[database]
# 应用数据库的 SQLAlchemy DSN。
url = "mysql+pymysql://root:root@127.0.0.1:3306/ai_cut?charset=utf8mb4"
# 是否输出 SQL 日志，便于调试。
echo = false

# Redis 连接配置，用于轻量协调和缓存。
[redis]
# 包含库编号的 Redis DSN。
url = "redis://127.0.0.1:6379/0"

# 本地文件存储结构，用于上传、产物和临时文件。
[storage]
# 所有运行时持久化数据的根目录。
root_dir = "storage"
# 上传源文件的保存目录。
uploads_dir = "storage/uploads"
# 生成媒体产物的输出目录。
outputs_dir = "storage/outputs"
# 临时工作文件目录。
temp_dir = "storage/temp"
# 对外可访问的存储根 URL。
public_base_url = "http://127.0.0.1:8000/storage"

# 系统提示词配置文件路径。
[prompt]
# 用于集中管理 system prompt 的 TOML 文件。
file = "config/prompts"

# 模型服务提供方和推理默认配置。
[model]
# 查询阿里云计费用量时使用的 Access Key ID。
aliyun_billing_access_key_id = ""
# 查询阿里云计费用量时使用的 Access Key Secret。
aliyun_billing_access_key_secret = ""
# 查询火山计费用量时使用的 Access Key ID。
volcengine_billing_access_key_id = ""
# 查询火山计费用量时使用的 Access Key Secret。
volcengine_billing_access_key_secret = ""
# 按模型维度的额度映射，JSON 字符串格式，可供前端或计费提示使用。
video_model_usage_quota = "{\"wan2.6-i2v\":300,\"seeddance-1.5-pro\":200}"
# 模型请求超时时间，单位秒。
timeout_seconds = 120
# 文本生成采样温度。
temperature = 0.15
# 文本响应最大生成 token 数。
max_tokens = 2000
# 视觉分析时抽取的帧数。
vision_frame_count = 6

[model.defaults]
text_analysis = "gpt-5.4"
planner_fusion = "gpt-5.4"
creative_prompt = "gpt-5.4"
vision_analysis = "qwen-vl-plus-latest"
prompt_rewrite = "qwen-vl-plus-latest"
image_generation = "Doubao-Seedream-4.5"
video_generation = "wan2.6-i2v"

[model.providers.openai]
provider = "openai"
api_key = "sk-d73debc1d49545b695bdedb6f8c50577"
base_url = "https://api.openai.com/v1"

[model.providers.openai.extras]
adapter = "openai_native"

[model.providers.aliyun_compatible]
provider = "aliyun-bailian"
api_key = "sk-d73debc1d49545b695bdedb6f8c50577"
base_url = "https://dashscope.aliyuncs.com/api/v2/apps/protocols/compatible-mode/v1"

[model.providers.aliyun_compatible.extras]
adapter = "openai_compatible"
use_responses_api = true

[model.providers.aliyun_video]
provider = "aliyun-bailian"
api_key = "sk-d73debc1d49545b695bdedb6f8c50577"
base_url = "https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis"

[model.providers.aliyun_video.extras]
adapter = "aliyun_video"
task_base_url = "https://dashscope.aliyuncs.com/api/v1/tasks"
poll_interval_seconds = 8
poll_timeout_seconds = 600
prompt_extend = false

[model.providers.volcengine_seed]
provider = "volcengine"
api_key = "51828257-b005-4f0e-9317-0adfca3d0610"
base_url = "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"

[model.providers.volcengine_seed.extras]
adapter = "volcengine_seed"
task_base_url = "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
image_base_url = "https://ark.cn-beijing.volces.com/api/v3/images/generations"
poll_interval_seconds = 8
poll_timeout_seconds = 600

[model.models."gpt-5.4"]
provider = "openai"
kind = "text"
label = "GPT-5.4"
family = "gpt"
capabilities = ["text_analysis", "planner_fusion", "creative_prompt", "script_generation"]
description = "OpenAI 文本理解与生成模型。"
aliases = ["gpt5.4", "gpt-5", "chatgpt"]
fallback_model = "qwen3.6-plus"

[model.models."qwen3.6-plus"]
provider = "aliyun_compatible"
kind = "text"
label = "Qwen 3.6 Plus"
family = "qwen"
capabilities = ["text_analysis", "planner_fusion", "creative_prompt", "script_generation"]
description = "阿里云兼容模式文本模型。"
aliases = ["qwen", "qwen-plus", "qwen-max", "qwen-max-latest"]

[model.models."qwen-plus"]
provider = "aliyun_compatible"
kind = "text"
label = "Qwen Plus"
family = "qwen"
capabilities = ["text_analysis", "planner_fusion", "creative_prompt", "script_generation"]
description = "Qwen 通用文本模型。"

[model.models."qwen-vl-plus-latest"]
provider = "aliyun_compatible"
kind = "vision"
label = "Qwen-VL Plus"
family = "qwen-vl"
capabilities = ["vision_analysis", "prompt_rewrite"]
description = "Qwen-VL 视觉理解模型。"
aliases = ["qwen-vl", "qwen-vl-plus", "qwen-vl-workflow"]
fallback_model = "qwen3-vl-flash"

[model.models."qwen3-vl-flash"]
provider = "aliyun_compatible"
kind = "vision"
label = "Qwen 3 VL Flash"
family = "qwen-vl"
capabilities = ["vision_analysis", "prompt_rewrite"]
description = "Qwen 视觉理解快速模型。"

[model.models."Doubao-Seedream-4.5"]
provider = "volcengine_seed"
kind = "image"
label = "Doubao Seedream 4.5"
family = "seedream"
capabilities = ["image_generation"]
description = "Seedream 文生图模型。"
aliases = ["doubao-seedream-4.5", "seedream-4.5"]

[model.models."wan2.6-i2v"]
provider = "aliyun_video"
kind = "video"
label = "Wan 2.6 图生视频"
family = "wan"
capabilities = ["video_generation"]
description = "阿里云 Wan 图生视频。"

[model.models."seeddance-1.5-pro"]
provider = "volcengine_seed"
kind = "video"
label = "SeedDance 1.5 Pro"
family = "seeddance"
capabilities = ["video_generation"]
description = "火山引擎 SeedDance 视频模型。"

# 请求未显式指定时使用的流程默认值。
[pipeline]
# 前后端共同使用的默认视频比例。
default_aspect_ratio = "9:16"
# 单次请求允许生成的最大结果数。
max_output_count = 10
# 流程允许处理的源视频最大时长，单位分钟。
max_source_minutes = 120
# 默认片头模板名称。
default_intro_template = "hook"
# 默认片尾模板名称。
default_outro_template = "brand"
