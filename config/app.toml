# 应用基础运行配置。
[app]
# 用于日志和界面展示的应用名称。
name = "AI Cut"
# 部署环境标识，通常为 local / dev / prod。
env = "local"
# API 服务在当前运行环境中的监听地址。
api_host = "0.0.0.0"
# FastAPI / Uvicorn 对外监听端口。
api_port = 8000
# 允许访问 API 的前端来源地址。
web_origin = "http://localhost:5173"
# 任务执行模式，inline 表示进程内直接执行。
execution_mode = "inline"

# 主数据库连接配置。
[database]
# 应用数据库的 SQLAlchemy DSN。
url = "mysql+pymysql://root:root@127.0.0.1:3306/ai_cut?charset=utf8mb4"
# 是否输出 SQL 日志，便于调试。
echo = false

# Redis 连接配置，用于轻量协调和缓存。
[redis]
# 包含库编号的 Redis DSN。
url = "redis://127.0.0.1:6379/0"

# 本地文件存储结构，用于上传、产物和临时文件。
[storage]
# 所有运行时持久化数据的根目录。
root_dir = "storage"
# 上传源文件的保存目录。
uploads_dir = "storage/uploads"
# 生成媒体产物的输出目录。
outputs_dir = "storage/outputs"
# 临时工作文件目录。
temp_dir = "storage/temp"
# 对外可访问的存储根 URL。
public_base_url = "http://127.0.0.1:8000/storage"

# 系统提示词配置文件路径。
[prompt]
# 用于集中管理 system prompt 的 TOML 文件。
file = "config/prompts"

# 模型服务提供方和推理默认配置。
[model]
# 主生成模型使用的服务提供方。
provider = "qwen"
# 默认文本生成模型。
model_name = "qwen3.6-plus"
# 默认图片生成模型。
image_model_name = "Doubao-Seedream-4.5"
# 主模型不可用时的回退模型。
fallback_model_name = "qwen-plus"
# 文本分析与理解专用的模型提供方。
text_analysis_provider = "chatgpt"
# 优先用于脚本分析和语义理解的模型。
text_analysis_model_name = "gpt-5.4"
# 优先分析模型不可用时的备用模型。
text_analysis_fallback_model_name = "qwen3.6-plus"
# 文本分析模型请求地址。
text_analysis_endpoint = "https://api.openai.com/v1/chat/completions"
# 文本分析模型专用 API Key（严格模式必填）。
text_analysis_api_key = "sk-d73debc1d49545b695bdedb6f8c50577"
# 提供给前端展示分析模型选项的 JSON 字符串目录。
text_analysis_models = "[{\"value\":\"gpt-5.4\",\"label\":\"GPT-5.4\",\"provider\":\"chatgpt\",\"family\":\"gpt\",\"endpoint\":\"https://api.openai.com/v1/chat/completions\",\"description\":\"ChatGPT / OpenAI key 模式，适合人物、对白、语境和剧情理解。\"},{\"value\":\"qwen3.6-plus\",\"label\":\"Qwen 3.6 Plus\",\"provider\":\"qwen\",\"family\":\"qwen\",\"description\":\"兼容当前阿里百炼 Key 模式的文本分析模型。\"}]"
# 用于抽帧理解的视觉模型。
vision_model_name = "qwen-vl-plus-latest"
# 视觉模型的备用选项。
vision_fallback_model_name = "qwen3-vl-flash"
# 主提供方兼容 OpenAI responses 的基础地址。
endpoint = "https://dashscope.aliyuncs.com/api/v2/apps/protocols/compatible-mode/v1"
# 阿里云视频生成提交地址。
video_endpoint = "https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis"
# 阿里云视频任务轮询地址。
video_task_endpoint = "https://dashscope.aliyuncs.com/api/v1/tasks"
# 流程里默认使用的视频生成模型。
video_model_name = "wan2.6-i2v"
# 显式暴露给前端的视频模型列表（严格模式必填）。
video_models = "[\"wan2.6-i2v\",\"seeddance-1.5-pro\"]"
# 视频生成时是否允许服务端自动扩写或改写提示词。
video_prompt_extend = false
# 阿里云视频任务轮询间隔，单位秒。
video_poll_interval_seconds = 8
# 阿里云视频任务最长等待时间，单位秒。
video_poll_timeout_seconds = 600
# 视频生成统一提交端点（严格模式必填）。
video_generation_endpoint = "https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis"
# 视频生成统一默认模型（严格模式必填）。
video_generation_default_model = "wan2.6-i2v"
# 视频生成统一轮询间隔（严格模式必填）。
video_generation_poll_interval_seconds = 8
# 视频生成统一最大等待时长（严格模式必填）。
video_generation_max_wait_seconds = 600
# 火山 SeedDance 提交地址。
seeddance_video_endpoint = "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
# 火山 SeedDance 任务轮询地址。
seeddance_video_task_endpoint = "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
# SeedDance / Seedream 专用 API Key（不要复用通用 api_key）。
seeddance_api_key = "51828257-b005-4f0e-9317-0adfca3d0610"
# SeedDance 任务轮询间隔，单位秒。
seeddance_poll_interval_seconds = 8
# SeedDance 任务最长等待时间，单位秒。
seeddance_poll_timeout_seconds = 600
# 查询阿里云计费用量时使用的 Access Key ID。
aliyun_billing_access_key_id = ""
# 查询阿里云计费用量时使用的 Access Key Secret。
aliyun_billing_access_key_secret = ""
# 查询火山计费用量时使用的 Access Key ID。
volcengine_billing_access_key_id = ""
# 查询火山计费用量时使用的 Access Key Secret。
volcengine_billing_access_key_secret = ""
# 按模型维度的额度映射，JSON 字符串格式，可供前端或计费提示使用。
video_model_usage_quota = "{\"wan2.6-i2v\":300,\"seeddance-1.5-pro\":200}"
# 主兼容提供方共用的 API Key。
api_key = "sk-d73debc1d49545b695bdedb6f8c50577"
# 模型请求超时时间，单位秒。
timeout_seconds = 120
# 文本生成采样温度。
temperature = 0.15
# 文本响应最大生成 token 数。
max_tokens = 2000
# 视觉分析时抽取的帧数。
vision_frame_count = 6

# 请求未显式指定时使用的流程默认值。
[pipeline]
# 前后端共同使用的默认视频比例。
default_aspect_ratio = "9:16"
# 单次请求允许生成的最大结果数。
max_output_count = 10
# 流程允许处理的源视频最大时长，单位分钟。
max_source_minutes = 120
# 默认片头模板名称。
default_intro_template = "hook"
# 默认片尾模板名称。
default_outro_template = "brand"
