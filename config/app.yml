app:
  name: "JianDou"
  env: "local"
  api_host: "0.0.0.0"
  api_port: 8000
  web_origin: "http://localhost:5173"
  execution_mode: "queue"

database:
  url: "jdbc:mysql://127.0.0.1:3306/jiandou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
  echo: false

redis:
  url: "redis://127.0.0.1:6379/0"

storage:
  root_dir: "storage"
  uploads_dir: "storage/uploads"
  outputs_dir: "storage/gen"
  temp_dir: "storage/temp"
  public_base_url: "http://127.0.0.1:8000/storage"

prompt:
  file: "config/prompts"

model:
  aliyun_billing_access_key_id: ""
  aliyun_billing_access_key_secret: ""
  volcengine_billing_access_key_id: ""
  volcengine_billing_access_key_secret: ""
  video_model_usage_quota: '{"wan2.6-i2v":300,"seedance-1.5-pro":200}'
  timeout_seconds: 120
  temperature: 0.15
  max_tokens: 2000
  vision_frame_count: 6
  providers:
    openai:
      provider: "openai"
      api_key: "sk-d73debc1d49545b695bdedb6f8c50577"
      base_url: "https://api.openai.com/v1"
    qwen:
      provider: "qwen"
      api_key: "sk-fb6e80b3f3034d4ea58923af0ff7bc7e"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      extras:
        use_responses_api: true
        timeout_seconds: 300
    ark:
      provider: "ark"
      api_key: "63dc1334-4b8a-488c-bf0e-8ff5efbeef98"
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      extras:
        use_responses_api: true
        timeout_seconds: 180
    wan:
      provider: "wan"
      api_key: "sk-fb6e80b3f3034d4ea58923af0ff7bc7e"
      base_url: "https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis"
      extras:
        task_base_url: "https://dashscope.aliyuncs.com/api/v1/tasks"
        poll_interval_seconds: 8
        poll_timeout_seconds: 600
        prompt_extend: false
    seedream:
      provider: "seedream"
      api_key: "63dc1334-4b8a-488c-bf0e-8ff5efbeef98"
      base_url: "https://ark.cn-beijing.volces.com/api/v3/images/generations"
    seedance:
      provider: "seedance"
      api_key: "63dc1334-4b8a-488c-bf0e-8ff5efbeef98"
      base_url: "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
      extras:
        task_base_url: "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
        image_base_url: "https://ark.cn-beijing.volces.com/api/v3/images/generations"
        poll_interval_seconds: 8
        poll_timeout_seconds: 600
        camera_fixed: false
        watermark: false
        prompt_extend: false
  models:
    "qwen3.6-plus":
      provider: "qwen"
      kind: "text"
      label: "Qwen 3.6 Plus"
      family: "qwen"
      capabilities:
        - "text_analysis"
        - "planner_fusion"
        - "creative_prompt"
        - "script_generation"
      description: "阿里 Qwen 文本模型。"
      fallback_model: "qwen3.5-flash"
    "qwen-plus":
      provider: "qwen"
      kind: "text"
      label: "Qwen Plus"
      family: "qwen"
      capabilities:
        - "text_analysis"
        - "planner_fusion"
        - "creative_prompt"
        - "script_generation"
      description: "Qwen 通用文本模型。"
    "qwen3.5-flash":
      provider: "qwen"
      kind: "text"
      label: "qwen3.5-flash"
      family: "qwen"
      capabilities:
        - "text_analysis"
        - "planner_fusion"
        - "creative_prompt"
        - "script_generation"
      description: "Qwen 通用文本模型 qwen3.5-flash。"
    "qwen3-vl-flash-2026-01-22":
      provider: "qwen"
      kind: "vision"
      label: "Qwen 3 VL Flash 2026-01-22"
      family: "qwen-vl"
      supports_seed: true
      capabilities:
        - "vision_analysis"
        - "prompt_rewrite"
      description: "Qwen 视觉理解快速模型。"
    "Doubao-Seedream-4.5":
      provider: "seedream"
      kind: "image"
      label: "Doubao Seedream 4.5"
      family: "seedream"
      capabilities:
        - "image_generation"
      description: "Seedream 文生图模型。"
    "seedance-1.5-pro":
      provider: "seedance"
      kind: "video"
      label: "Seedance 1.5 Pro"
      family: "seedance"
      supports_seed: true
      capabilities:
        - "video_generation"
      description: "火山引擎 Seedance 视频模型。"
      generation_mode: "i2v"
      supported_sizes: "480*854,854*480,720*1280,1280*720"
      supported_durations: "4,6,8,10,12"

catalog:
  defaults:
    style_preset: "cinematic"
    image_size: "1024x1024"
    video_size: "720*1280"
    video_duration_seconds: 10
    video_generate_audio: true
  aspect_ratios:
    "9:16":
      label: "竖版 9:16"
    "16:9":
      label: "横版 16:9"
  style_presets:
    cinematic:
      label: "电影写实"
      description: "贴近真实影视剧照与镜头语言"
    drama:
      label: "短剧冲突"
      description: "更强调人物冲突和情绪推进"
  image_sizes:
    "1024x1024":
      label: "1:1 · 1024x1024"
      width: 1024
      height: 1024
    "720x1280":
      label: "9:16 · 720x1280"
      width: 720
      height: 1280
  video_sizes:
    "480*854":
      label: "480P · 9:16（480 x 854）"
      width: 480
      height: 854
    "854*480":
      label: "480P · 16:9（854 x 480）"
      width: 854
      height: 480
    "720*1280":
      label: "720P · 9:16（720 x 1280）"
      width: 720
      height: 1280
    "1280*720":
      label: "720P · 16:9（1280 x 720）"
      width: 1280
      height: 720
  video_durations:
    "4":
      label: "4 秒"
    "6":
      label: "6 秒"
    "8":
      label: "8 秒"
    "10":
      label: "10 秒"
    "12":
      label: "12 秒"

pipeline:
  default_aspect_ratio: "9:16"
  max_output_count: 10
  max_source_minutes: 120
  default_intro_template: "hook"
  default_outro_template: "brand"
